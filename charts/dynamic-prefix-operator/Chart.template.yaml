apiVersion: v2

name: dynamic-prefix-operator
description: |
  A Kubernetes operator for managing dynamic IPv6 prefix delegation.
  Automatically updates Cilium LoadBalancerIPPools, CIDRGroups, and other
  resources when your ISP-delegated IPv6 prefix changes.

type: application

keywords:
  - kubernetes
  - operator
  - ipv6
  - dhcpv6
  - prefix-delegation
  - cilium
  - networking

home: https://github.com/pkizzle/dynamic-prefix-operator
sources:
  - https://github.com/pkizzle/dynamic-prefix-operator

maintainers:
  - name: pkizzle
    url: https://github.com/pkizzle

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: networking
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/prerelease: "{{IS_PRERELEASE}}"
  artifacthub.io/crds: |
    - kind: DynamicPrefix
      version: v1alpha1
      name: dynamicprefixes.dynamic-prefix.io
      displayName: DynamicPrefix
      description: Defines IPv6 prefix acquisition, address ranges, and transition behavior managed by the operator.

# The version and appVersion fields are set automatically by the release tool
version: 0.0.0
appVersion: "v0.0.0"
