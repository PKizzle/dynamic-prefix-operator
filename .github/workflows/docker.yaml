name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: image_name
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform short name
        id: platform
        run: |
          platform=${{ matrix.platform }}
          echo "short=${platform#linux/}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.lowercase }}
          # Suffix tags with architecture for per-arch pulls
          flavor: |
            suffix=-${{ steps.platform.outputs.short }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          provenance: false

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.short }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Create multi-arch manifest after all platform builds complete
  manifest:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Convert repository name to lowercase
        id: image_name
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.lowercase }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ steps.image_name.outputs.lowercase }}@sha256:%s ' *)

      - name: Install latest Nydus tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64)
              nydus_arch="amd64"
              ;;
            aarch64|arm64)
              nydus_arch="arm64"
              ;;
            *)
              echo "::error::Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          cd "$tmpdir"

          release_json="$(curl -fsSL -H 'Accept: application/vnd.github+json' https://api.github.com/repos/dragonflyoss/nydus/releases/latest)"
          asset_name="$(jq -r --arg suffix "linux-${nydus_arch}.tgz" '.assets[].name | select(startswith("nydus-static-v") and endswith($suffix))' <<< "$release_json" | head -n 1)"

          if [[ -z "$asset_name" ]]; then
            echo "::error::Unable to find latest Nydus static Linux ${nydus_arch} tarball"
            exit 1
          fi

          asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .browser_download_url' <<< "$release_json")"
          checksum_name="${asset_name}.sha256sum"
          checksum_url="$(jq -r --arg name "$checksum_name" '.assets[] | select(.name == $name) | .browser_download_url' <<< "$release_json")"

          curl -fsSLO "$asset_url"
          if [[ -n "$checksum_url" && "$checksum_url" != "null" ]]; then
            curl -fsSLO "$checksum_url"
            sha256sum -c "$checksum_name"
          else
            echo "::warning::No checksum asset found for $asset_name; continuing without checksum verification"
          fi

          sudo tar -xzf "$asset_name" -C /usr/local/bin --strip-components=1 \
            nydus-static/nydusify \
            nydus-static/nydus-image
          sudo chmod +x /usr/local/bin/nydusify /usr/local/bin/nydus-image

          nydusify --version

      - name: Create and push Nydus image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if (( ${#tags[@]} == 0 )); then
            echo "::error::No image tags found in Docker metadata output"
            exit 1
          fi

          echo "## Nydus images" >> "$GITHUB_STEP_SUMMARY"
          for source_image in "${tags[@]}"; do
            target_image="${source_image}-nydus"
            echo "Converting ${source_image} to ${target_image}"
            DOCKER_CONFIG="$HOME/.docker" nydusify convert \
              --source "$source_image" \
              --target "$target_image" \
              --all-platforms
            echo "- ${target_image}" >> "$GITHUB_STEP_SUMMARY"
          done
