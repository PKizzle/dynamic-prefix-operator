name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  HELM_REPO_URL: https://pkizzle.github.io/dynamic-prefix-operator

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.1

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.8.1"

      - name: Determine Prerelease Status
        id: prerelease
        # specific logic: if version contains a hyphen (e.g. 1.0.0-rc.1), it is a prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Render Chart.yaml from Template
        run: |
          # Define paths
          TEMPLATE_FILE="charts/dynamic-prefix-operator/Chart.template.yaml"
          CHART_FILE="charts/dynamic-prefix-operator/Chart.yaml"
          VALUES_FILE="charts/dynamic-prefix-operator/values.yaml"
          
          VERSION="${{ github.ref_name }}"
          IS_PRE="${{ steps.prerelease.outputs.is_prerelease }}"

          # Generate Chart.yaml from template
          sed -e "s/{{IS_PRERELEASE}}/$IS_PRE/g" \
              -e "s/^version: .*/version: $VERSION/" \
              -e "s/^appVersion: .*/appVersion: \"$VERSION\"/" \
              $TEMPLATE_FILE > $CHART_FILE

          # Update image tag in values.yaml to use the release version
          sed -i "s/tag:.*/tag: \"$VERSION\"/" $VALUES_FILE

      - name: Convert repository to lowercase
        id: repository
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository }}

      - name: Generate install.yaml
        run: |
          # Update image in kustomize
          cd config/manager
          kustomize edit set image controller=${{ env.REGISTRY }}/${{ steps.repository.outputs.lowercase }}:${{ github.ref_name }}
          cd ../..

          # Build the full manifest
          kustomize build config/default > install.yaml

      - name: Package Helm chart
        run: |
          helm package charts/dynamic-prefix-operator --destination .

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repository_owner
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository_owner }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push dynamic-prefix-operator-${{ github.ref_name }}.tgz oci://${{ env.REGISTRY }}/${{ steps.repository_owner.outputs.lowercase }}/dynamic-prefix-operator/helm

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          REPOSITORY="${{ github.repository }}"
          REPOSITORY_LOWER="${{ steps.repository.outputs.lowercase }}"
          REPOSITORY_OWNER_LOWER="${{ steps.repository_owner.outputs.lowercase }}"

          CHANGELOG_SECTION="$(awk -v version="$VERSION" '
            $1 == "##" && $2 == version { in_section = 1; next }
            in_section && /^## / { exit }
            in_section {
              if (!seen_content && $0 == "") { next }
              seen_content = 1
              print
            }
          ' CHANGELOG.md)"

          if [[ -z "${CHANGELOG_SECTION//[[:space:]]/}" ]]; then
            echo "::error::No CHANGELOG.md entry found for ${VERSION}"
            exit 1
          fi

          cat > release-notes.md <<EOF
          ## Release Highlights

          ${CHANGELOG_SECTION}

          ## Installation

          ### Using the Helm repository

          \`\`\`bash
          helm repo add dynamic-prefix-operator ${HELM_REPO_URL}
          helm repo update
          helm install dynamic-prefix-operator \
            dynamic-prefix-operator/dynamic-prefix-operator \
            --version ${VERSION}
          \`\`\`

          ### Using Helm OCI

          \`\`\`bash
          helm install dynamic-prefix-operator \
            oci://ghcr.io/${REPOSITORY_OWNER_LOWER}/dynamic-prefix-operator/helm/dynamic-prefix-operator \
            --version ${VERSION}
          \`\`\`

          ### Using kubectl

          \`\`\`bash
          kubectl apply -f https://github.com/${REPOSITORY}/releases/download/${VERSION}/install.yaml
          \`\`\`

          ## Docker Images

          Multi-arch images (amd64, arm64) are available at:

          \`\`\`
          ghcr.io/${REPOSITORY_LOWER}:${VERSION}
          \`\`\`

          ## What's Changed

          See the [commit history](https://github.com/${REPOSITORY_LOWER}/commits/${VERSION}) for details.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release edit "$tag" --notes-file release-notes.md
            gh release upload "$tag" install.yaml dynamic-prefix-operator-${{ github.ref_name }}.tgz --clobber
          else
            if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
              gh release create "$tag" \
                --target "${{ github.sha }}" \
                --title "$tag" \
                --notes-file release-notes.md \
                --prerelease \
                install.yaml dynamic-prefix-operator-${{ github.ref_name }}.tgz
            else
              gh release create "$tag" \
                --target "${{ github.sha }}" \
                --title "$tag" \
                --notes-file release-notes.md \
                install.yaml dynamic-prefix-operator-${{ github.ref_name }}.tgz
            fi
          fi

      - name: Build Helm repository for GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PAGES_DIR="dist/helm-repo"
          ASSETS_DIR="dist/chart-assets"
          CURRENT_TAG="${{ github.ref_name }}"

          rm -rf "$PAGES_DIR" "$ASSETS_DIR"
          mkdir -p "$PAGES_DIR" "$ASSETS_DIR/$CURRENT_TAG"

          # Keep GitHub Releases as the single host for chart archives while
          # still publishing a classic Helm index via GitHub Pages.
          cp "dynamic-prefix-operator-${CURRENT_TAG}.tgz" "$ASSETS_DIR/$CURRENT_TAG/"

          # Backfill the index from all release chart assets so the first Pages
          # deployment already exposes historical chart versions.
          gh release list --limit 100 --json tagName --jq '.[].tagName' | while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            mkdir -p "$ASSETS_DIR/$tag"
            gh release download "$tag" \
              --pattern 'dynamic-prefix-operator-*.tgz' \
              --dir "$ASSETS_DIR/$tag" \
              --clobber || true
          done

          rm -f "$PAGES_DIR/index.yaml"
          shopt -s nullglob
          found_package=false
          for release_dir in "$ASSETS_DIR"/*; do
            [[ -d "$release_dir" ]] || continue

            tag="$(basename "$release_dir")"
            packages=("$release_dir"/dynamic-prefix-operator-*.tgz)
            if (( ${#packages[@]} == 0 )); then
              continue
            fi

            found_package=true
            tmpdir="$(mktemp -d)"
            cp "${packages[@]}" "$tmpdir/"

            package_url="https://github.com/${{ github.repository }}/releases/download/${tag}"
            if [[ -f "$PAGES_DIR/index.yaml" ]]; then
              helm repo index "$tmpdir" --url "$package_url" --merge "$PAGES_DIR/index.yaml"
            else
              helm repo index "$tmpdir" --url "$package_url"
            fi

            cp "$tmpdir/index.yaml" "$PAGES_DIR/index.yaml"
            rm -rf "$tmpdir"
          done

          if [[ "$found_package" != "true" ]]; then
            echo "::error::No Helm chart packages found for repository index generation"
            exit 1
          fi

          if ! grep -q "https://github.com/${{ github.repository }}/releases/download/" "$PAGES_DIR/index.yaml"; then
            echo "::error::Helm repository index must point to GitHub release chart assets"
            exit 1
          fi

          if compgen -G "$PAGES_DIR/*.tgz" > /dev/null; then
            echo "::error::GitHub Pages artifact must not duplicate chart archives"
            exit 1
          fi

          cp artifacthub-repo.yml "$PAGES_DIR/artifacthub-repo.yml"
          touch "$PAGES_DIR/.nojekyll"
          cat > "$PAGES_DIR/README.md" <<EOF
          # Dynamic Prefix Operator Helm Repository

          Add this repository with:

              helm repo add dynamic-prefix-operator ${HELM_REPO_URL}
              helm repo update

          Then install the chart with:

              helm install dynamic-prefix-operator dynamic-prefix-operator/dynamic-prefix-operator
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Helm repository Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/helm-repo
          include-hidden-files: true

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy Helm repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
